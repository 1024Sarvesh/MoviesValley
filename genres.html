<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genres</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>


        <nav id="MovieTypes">
        </nav>
    </header>

    <section id="MoviesData" class="Genres-Movie-Container"></section>


    <script type="module" src="./main.js"></script>
    <script type="module">
        import { options } from "./main.js"
        import { TMDB_IMAGE_PATH } from "./main.js"
        import { TMDB_BASE_URL } from "./main.js"



        const GetMovieByGen = async (genreId) => {
            const res = await fetch(`https://api.themoviedb.org/3/discover/movie?include_adult=false&include_video=false&language=en-US&page=1&sort_by=popularity.desc&with_genres=${genreId}`, options)
            const data = await res.json()
            console.log(data)
            const GenresContainer = document.getElementById("MoviesData")
            for (let i = 0; i < data.results.length; i++) {
                GenresContainer.innerHTML += `<div class="Movie-Card">
    <a href="Movies.html?mid=${data.results[i].id}">
        <img src="${TMDB_IMAGE_PATH}${data.results[i].poster_path}" alt="${data.results[i].title}">

        <div class="overlay">
            <h2>${data.results[i].title}</h2>
            <p>${data.results[i].overview}</p>
        </div>
    </a>
</div>`
            }

        }

        window.addEventListener("load", () => {
            const params = new URLSearchParams(window.location.search);
            const genreId = params.get("mid");
            console.log(genreId)
            GetMovieByGen(genreId)

        })
    </script>
</body>

</html>
