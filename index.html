<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css">
  <title>moviesvalley</title>
</head>

<body>
  <header>

    <nav id="MovieTypes">
  
    </nav>
  </header>
  <section id="img-con">
    <div id="poster-con"></div>
  </section>

  <h1>Now Playing Movies</h1>
  <section id="NowPlaying" class="Movie-Container"></section>
  <h1>Top Rated Movies</h1>
  <section id="TopRated" class="Movie-Container"></section>
  <h1>Popular Movies</h1>
  <section id="Popular" class="Movie-Container"></section>
  <script type="module" src="./main.js"></script>

  <script type="module">
    import { options } from "./main.js"
    import { TMDB_IMAGE_PATH } from "./main.js"
    import { TMDB_BASE_URL } from "./main.js"

    const GetupcomingNow = async () => {
      const res = await fetch("https://api.themoviedb.org/3/movie/upcoming", options);
      const data = await res.json();

      const movies = data.results;
      // console.log(movies)

      const ContainerEl = document.querySelector("#img-con");
      const PosterEl = document.querySelector("#poster-con")

      const imgEl = document.createElement("img");





      ContainerEl.appendChild(imgEl);

      // let index = 0;

      //   function changeBanner() {
      //     imgEl.src = TMDB_IMAGE_PATH + movies[index].backdrop_path;
      //     index = (index + 1) % movies.length;
      //   }

      //   changeBanner(); 
      //   setInterval(changeBanner, 3000); 

      imgEl.src = TMDB_IMAGE_PATH + movies[0].backdrop_path;




      movies.forEach((movie) => {
        const poster = document.createElement("img");
        poster.src = TMDB_IMAGE_PATH + movie.poster_path;
        // console.log(movie.title)


        poster.addEventListener("click", () => {
          imgEl.src = TMDB_IMAGE_PATH + movie.backdrop_path;

        });


        PosterEl.appendChild(poster);
      });


    };

    const GetNowPlaying = async (path, id) => {
      const TMDB_BASE_URL = "https://api.themoviedb.org/3"
      const res = await fetch(`${TMDB_BASE_URL}${path}`, options);
      const data = await res.json()
      const NowPlayingEl = document.getElementById(id)
      
      for (let i = 0; i < data.results.length; i++) {
        NowPlayingEl.innerHTML += `
    <div>
    <a href="/Movies.html?mid=${data.results[i].id}">
      <img src="${TMDB_IMAGE_PATH}${data.results[i].poster_path}" alt="Movie Poster">

      <div class="overlay">
        <h2>${data.results[i].title}</h2>
        <p>${data.results[i].overview}</p>
      </div>
      </a>
    </div>
  `;
      }

    }


    window.addEventListener("load", () => {
      GetupcomingNow()
      GetNowPlaying("/movie/now_playing", "NowPlaying")
      GetNowPlaying("/movie/top_rated", "TopRated")
      GetNowPlaying("/movie/popular", "Popular")
    })
  </script>
</body>

</html>
